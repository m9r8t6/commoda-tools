<header class="topbar">
    <h1 class="page-title" id="appTitle">Mitarbeitersuche</h1>
    
    <div class="topbar-filters active-filters" id="filters-mitarbeiter">
        
        <input type="text" id="jobFilter" list="jobOptions" class="filter-input" placeholder="Job wählen/tippen" style="width: 180px;">
        <datalist id="jobOptions">
            <option value="Steuerberater">
            <option value="Steuerfachangestellter">
            <option value="Lohnbuchhalter">
            <option value="Bilanzbuchhalter">
            <option value="Steuerfachwirt">
            <option value="Finanzbuchhalter">
            <option value="Kanzleimanager">
        </datalist>

        <input type="text" id="ortFilter" class="filter-input" placeholder="Ort / PLZ" style="width: 130px;">

        <input type="text" id="distanzFilter" list="distanzOptions" class="filter-input" placeholder="Umkreis" style="width: 110px;">
        <datalist id="distanzOptions">
            <option value="0 km (Vor Ort)">
            <option value="10 km">
            <option value="20 km">
            <option value="30 km">
            <option value="40 km">
            <option value="50 km">
        </datalist>

        <input type="number" id="anzahlFilter" list="anzahlOptions" class="filter-input" placeholder="Anzahl" value="5" min="1" max="10" style="width: 80px;">
        <datalist id="anzahlOptions">
            <option value="5">
            <option value="10">
        </datalist>

        <button class="btn-primary" id="searchBtn">Suchen</button>
    </div>

    <div class="topbar-filters" id="filters-gesetze">
        </div>
</header>
